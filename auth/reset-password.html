<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passwort zurücksetzen – Wabu AV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2d6a4f;
      --green-dark: #1b4332;
      --green-light: #95d5b2;
      --red: #dc2626;
      --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      display: block;
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      object-fit: contain;
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      color: var(--green-dark);
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: var(--green); }
    button {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover:not(:disabled) { background: var(--green-dark); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.success { background: #dcfce7; color: #166534; display: block; }
    .msg.error   { background: #fee2e2; color: var(--red); display: block; }
    .hint {
      margin-top: 24px;
      text-align: center;
      font-size: 0.82rem;
      color: #9ca3af;
    }
    #invalidState {
      text-align: center;
      color: var(--red);
      font-size: 0.95rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="../app/assets/assets/images/logo.png"
         onerror="this.style.display='none'"
         class="logo" alt="Wabu AV Logo" />
    <h1>Neues Passwort</h1>
    <p class="subtitle">Gib dein neues Passwort ein.</p>

    <p id="invalidState">
      Dieser Link ist ungültig oder abgelaufen.<br/>
      Bitte fordere einen neuen Reset-Link an.
    </p>

    <form id="resetForm">
      <label for="password">Neues Passwort</label>
      <input type="password" id="password" placeholder="Mindestens 8 Zeichen" required />

      <label for="passwordConfirm">Passwort bestätigen</label>
      <input type="password" id="passwordConfirm" placeholder="Passwort wiederholen" required />

      <button type="submit" id="submitBtn">Passwort speichern</button>
    </form>

    <div id="msg" class="msg"></div>

    <p class="hint">Wabu AV &mdash; Albverein App</p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL  = 'https://pdblyaueljlufccbkqag.supabase.co'
    const SUPABASE_ANON = 'sb_publishable_Qyq6z-o7XWdA2s_mJLXR8g_yIx0Dkpr'

    // flowType 'pkce' damit exchangeCodeForSession funktioniert
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { flowType: 'pkce' }
    })

    const form      = document.getElementById('resetForm')
    const submitBtn = document.getElementById('submitBtn')
    const msgEl     = document.getElementById('msg')
    const invalidEl = document.getElementById('invalidState')

    function showMsg(text, type) {
      msgEl.textContent = text
      msgEl.className = `msg ${type}`
    }

    // PKCE-Flow: ?code= als Query-Parameter (modernes Supabase-Standard)
    const pkceCode = new URLSearchParams(window.location.search).get('code')
    // Implicit-Flow (Legacy): #access_token= als Hash-Fragment
    const hasImplicitToken = window.location.hash.includes('access_token')

    if (pkceCode) {
      // Code gegen Session tauschen
      const { error } = await supabase.auth.exchangeCodeForSession(pkceCode)
      if (error) {
        form.style.display = 'none'
        invalidEl.style.display = 'block'
      }
      // Bei Erfolg: Formular bleibt sichtbar (Standard-Zustand im HTML)
    } else if (!hasImplicitToken) {
      // Kein Token in URL — prüfe ob bereits eine gültige Session vorliegt
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) {
        form.style.display = 'none'
        invalidEl.style.display = 'block'
      }
    }

    // Implicit-Flow: PASSWORD_RECOVERY-Event abwarten (Hash wird auto verarbeitet)
    supabase.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        form.style.display = 'block'
        invalidEl.style.display = 'none'
      }
    })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const pw  = document.getElementById('password').value
      const pw2 = document.getElementById('passwordConfirm').value

      if (pw.length < 8) {
        showMsg('Das Passwort muss mindestens 8 Zeichen lang sein.', 'error')
        return
      }
      if (pw !== pw2) {
        showMsg('Die Passwörter stimmen nicht überein.', 'error')
        return
      }

      submitBtn.disabled = true
      submitBtn.textContent = 'Speichern...'

      const { error } = await supabase.auth.updateUser({ password: pw })

      if (error) {
        showMsg('Fehler: ' + error.message, 'error')
        submitBtn.disabled = false
        submitBtn.textContent = 'Passwort speichern'
      } else {
        form.style.display = 'none'
        showMsg('Passwort erfolgreich geändert! Du kannst die App jetzt öffnen und dich einloggen.', 'success')
      }
    })
  </script>
</body>
</html>

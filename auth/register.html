<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrierung – Wabu AV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2d6a4f;
      --green-dark: #1b4332;
      --green-light: #95d5b2;
      --red: #dc2626;
      --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      display: block;
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      object-fit: contain;
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      color: var(--green-dark);
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .row {
      display: flex;
      gap: 12px;
    }
    .row .field { flex: 1; }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--green); }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }
    button[type="submit"]:hover:not(:disabled) { background: var(--green-dark); }
    button[type="submit"]:disabled { opacity: .6; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      line-height: 1.5;
    }
    .msg.success { background: #dcfce7; color: #166534; display: block; }
    .msg.error   { background: #fee2e2; color: var(--red); display: block; }
    .hint {
      margin-top: 24px;
      text-align: center;
      font-size: 0.82rem;
      color: #9ca3af;
    }
    #invalidState {
      text-align: center;
      padding: 16px;
      color: var(--red);
      font-size: 0.95rem;
      line-height: 1.6;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="../app/assets/assets/images/logo.png"
         onerror="this.style.display='none'"
         class="logo" alt="Wabu AV Logo" />
    <h1>Konto erstellen</h1>
    <p class="subtitle" id="welcomeText">Willkommen bei der Wabu AV App.</p>

    <p id="invalidState">
      Dieser Einladungslink ist ungültig oder bereits verwendet.<br/>
      Bitte wende dich an den Administrator.
    </p>

    <form id="registerForm">
      <div class="row">
        <div class="field">
          <label for="firstName">Vorname *</label>
          <input type="text" id="firstName" placeholder="Max" required />
        </div>
        <div class="field">
          <label for="lastName">Nachname *</label>
          <input type="text" id="lastName" placeholder="Mustermann" required />
        </div>
      </div>

      <div class="field">
        <label for="email">E-Mail-Adresse *</label>
        <input type="email" id="email" placeholder="max@beispiel.de" required />
      </div>

      <div class="field">
        <label for="password">Passwort *</label>
        <input type="password" id="password" placeholder="Mindestens 8 Zeichen" required />
      </div>

      <div class="field">
        <label for="passwordConfirm">Passwort bestätigen *</label>
        <input type="password" id="passwordConfirm" placeholder="Passwort wiederholen" required />
      </div>

      <button type="submit" id="submitBtn">Konto erstellen</button>
    </form>

    <div id="msg" class="msg"></div>
    <p class="hint">Wabu AV &mdash; Albverein App</p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL  = 'https://pdblyaueljlufccbkqag.supabase.co'
    const SUPABASE_ANON = 'sb_publishable_Qyq6z-o7XWdA2s_mJLXR8g_yIx0Dkpr'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON)

    const form        = document.getElementById('registerForm')
    const submitBtn   = document.getElementById('submitBtn')
    const msgEl       = document.getElementById('msg')
    const invalidEl   = document.getElementById('invalidState')
    const welcomeText = document.getElementById('welcomeText')

    // Token aus URL lesen
    const params = new URLSearchParams(window.location.search)
    const token  = params.get('token')

    if (!token) {
      form.style.display = 'none'
      invalidEl.style.display = 'block'
    }

    function showMsg(text, type) {
      msgEl.textContent = text
      msgEl.className = `msg ${type}`
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const firstName = document.getElementById('firstName').value.trim()
      const lastName  = document.getElementById('lastName').value.trim()
      const email     = document.getElementById('email').value.trim()
      const password  = document.getElementById('password').value
      const password2 = document.getElementById('passwordConfirm').value

      if (password.length < 8) {
        showMsg('Das Passwort muss mindestens 8 Zeichen lang sein.', 'error')
        return
      }
      if (password !== password2) {
        showMsg('Die Passwörter stimmen nicht überein.', 'error')
        return
      }

      submitBtn.disabled = true
      submitBtn.textContent = 'Konto wird erstellt...'

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: 'https://lunde2020.github.io/AV_App-web/auth/welcome.html',
          data: {
            first_name:   firstName,
            last_name:    lastName,
            display_name: `${firstName} ${lastName}`.trim(),
            invite_token: token,
          },
        },
      })

      if (error) {
        showMsg('Fehler: ' + error.message, 'error')
        submitBtn.disabled = false
        submitBtn.textContent = 'Konto erstellen'
        return
      }

      // Erfolg — Formular ausblenden
      form.style.display = 'none'
      welcomeText.style.display = 'none'
      showMsg(
        `Fast geschafft, ${firstName}! 🎉\n\n` +
        `Wir haben eine Bestätigungsmail an ${email} gesendet.\n` +
        `Klicke auf den Link in der Mail, um dein Konto zu aktivieren.\n\n` +
        `Danach kannst du dich in der Wabu AV App anmelden.`,
        'success'
      )
      msgEl.style.whiteSpace = 'pre-line'
    })
  </script>
</body>
</html>

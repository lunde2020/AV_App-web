<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Willkommen – Wabu AV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2d6a4f;
      --green-dark: #1b4332;
      --green-light: #95d5b2;
      --red: #dc2626;
      --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      display: block;
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      object-fit: contain;
    }
    .check {
      width: 56px;
      height: 56px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.6rem;
    }
    h1 {
      font-size: 1.5rem;
      color: var(--green-dark);
      margin-bottom: 10px;
    }
    .name {
      color: var(--green);
      font-weight: 700;
    }
    .subtitle {
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .app-hint {
      background: #f0fdf4;
      border: 1.5px solid var(--green-light);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 28px;
      font-size: 0.9rem;
      color: #374151;
      line-height: 1.6;
    }
    .app-hint strong { color: var(--green-dark); }
    .btn-logout {
      background: none;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      color: #6b7280;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover {
      border-color: #9ca3af;
      color: #374151;
    }
    .hint {
      margin-top: 24px;
      font-size: 0.82rem;
      color: #9ca3af;
    }
    #loading { color: #6b7280; font-size: 0.95rem; }
    #content { display: none; }
    #inviteSetup { display: none; }

    /* Passwort-Formular (Invite-Flow) */
    #inviteSetup { text-align: left; }
    #inviteSetup h1 { text-align: center; }
    #inviteSetup .subtitle { text-align: center; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: var(--green); }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--green-dark); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .msg {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.error { background: #fee2e2; color: var(--red); display: block; }
  </style>
</head>
<body>
  <div class="card">
    <img src="../app/assets/assets/images/logo.png"
         onerror="this.style.display='none'"
         class="logo" alt="Wabu AV Logo" />

    <p id="loading">Lade...</p>

    <!-- Reguläre E-Mail-Bestätigung / nach Passwort gesetzt -->
    <div id="content">
      <div class="check">✓</div>
      <h1>Willkommen,<br/><span class="name" id="userName">...</span>!</h1>
      <p class="subtitle" id="subtitleText">
        Dein Account wurde erfolgreich bestätigt.
      </p>

      <div class="app-hint">
        <strong>Nächster Schritt:</strong><br/>
        Lade die <strong>Wabu AV App</strong> auf dein Smartphone
        und melde dich mit deiner E-Mail-Adresse an.
      </div>

      <a href="https://lunde2020.github.io/AV_App-web/" class="btn-primary" style="display:block;text-align:center;text-decoration:none;margin-bottom:12px;">
        App herunterladen
      </a>

      <button class="btn-logout" id="logoutBtn">Abmelden</button>
    </div>

    <!-- Einladungs-Flow: Passwort setzen -->
    <div id="inviteSetup">
      <h1>Hallo,<br/><span class="name" id="inviteUserName">...</span>!</h1>
      <p class="subtitle">
        Lege ein Passwort fest, um deinen Wabu AV Account zu aktivieren.
      </p>
      <form id="inviteForm">
        <label for="invitePassword">Passwort</label>
        <input type="password" id="invitePassword" placeholder="Mindestens 8 Zeichen" required />
        <label for="invitePasswordConfirm">Passwort bestätigen</label>
        <input type="password" id="invitePasswordConfirm" placeholder="Passwort wiederholen" required />
        <button type="submit" class="btn-primary" id="inviteSubmitBtn">
          Konto aktivieren
        </button>
      </form>
      <div id="inviteMsg" class="msg"></div>
    </div>

    <p class="hint">Wabu AV &mdash; Albverein App</p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL  = 'https://pdblyaueljlufccbkqag.supabase.co'
    const SUPABASE_ANON = 'sb_publishable_Qyq6z-o7XWdA2s_mJLXR8g_yIx0Dkpr'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON)

    const loadingEl      = document.getElementById('loading')
    const contentEl      = document.getElementById('content')
    const inviteSetupEl  = document.getElementById('inviteSetup')
    const userNameEl     = document.getElementById('userName')
    const subtitleEl     = document.getElementById('subtitleText')
    const inviteNameEl   = document.getElementById('inviteUserName')
    const inviteMsgEl    = document.getElementById('inviteMsg')
    const inviteSubmitBtn = document.getElementById('inviteSubmitBtn')
    const logoutBtn      = document.getElementById('logoutBtn')

    function showWelcome(user, subtitle) {
      const displayName =
        user.user_metadata?.display_name ||
        user.user_metadata?.member_name ||
        user.user_metadata?.full_name ||
        user.email?.split('@')[0] ||
        'Mitglied'
      userNameEl.textContent = displayName
      if (subtitle) subtitleEl.textContent = subtitle
      loadingEl.style.display  = 'none'
      inviteSetupEl.style.display = 'none'
      contentEl.style.display  = 'block'
    }

    function showInviteSetup(user) {
      const displayName =
        user.user_metadata?.display_name ||
        user.user_metadata?.member_name ||
        user.user_metadata?.full_name ||
        user.email?.split('@')[0] ||
        'Mitglied'
      inviteNameEl.textContent = displayName
      loadingEl.style.display     = 'none'
      contentEl.style.display     = 'none'
      inviteSetupEl.style.display = 'block'
    }

    function showInviteError(msg) {
      inviteMsgEl.textContent = msg
      inviteMsgEl.className   = 'msg error'
    }

    async function handleSession(session, eventType, isInvite) {
      const user = session.user

      if (isInvite && eventType !== 'USER_UPDATED') {
        // Einladungs-Flow: Passwort setzen
        showInviteSetup(user)
      } else {
        // Reguläre Bestätigung oder nach Passwort-Änderung
        const subtitle = eventType === 'USER_UPDATED'
          ? 'Dein Passwort wurde gesetzt. Du kannst die App jetzt öffnen.'
          : 'Dein Account wurde erfolgreich bestätigt.'
        showWelcome(user, subtitle)
      }
    }

    // URL-Parameter auslesen (vor exchangeCodeForSession, da danach ggf. navigiert wird)
    const urlParams  = new URLSearchParams(window.location.search)
    const pkceCode   = urlParams.get('code')
    const isInvite   = urlParams.get('flow') === 'invite'

    if (pkceCode) {
      const { data, error } = await supabase.auth.exchangeCodeForSession(pkceCode)
      if (error || !data.session) {
        loadingEl.textContent = 'Link ungültig oder abgelaufen.'
      } else {
        await handleSession(data.session, 'SIGNED_IN', isInvite)
      }
    } else {
      // Implicit-Flow (Hash-Token) oder bestehende Session
      let handled = false

      supabase.auth.onAuthStateChange(async (event, session) => {
        if (session?.user && !handled) {
          handled = true
          await handleSession(session, event, isInvite)
        }
      })

      // Kurz warten damit onAuthStateChange den Hash-Token verarbeiten kann
      await new Promise(r => setTimeout(r, 300))

      if (!handled) {
        const { data: { session } } = await supabase.auth.getSession()
        if (session?.user) {
          handled = true
          await handleSession(session, 'SIGNED_IN', isInvite)
        } else {
          loadingEl.textContent = 'Keine aktive Sitzung gefunden.'
        }
      }
    }

    // Invite-Formular: Passwort setzen + Member verknüpfen
    document.getElementById('inviteForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const pw  = document.getElementById('invitePassword').value
      const pw2 = document.getElementById('invitePasswordConfirm').value

      if (pw.length < 8) {
        showInviteError('Das Passwort muss mindestens 8 Zeichen lang sein.')
        return
      }
      if (pw !== pw2) {
        showInviteError('Die Passwörter stimmen nicht überein.')
        return
      }

      inviteSubmitBtn.disabled    = true
      inviteSubmitBtn.textContent = 'Aktiviere...'

      // 1. Passwort setzen
      const { error: pwError } = await supabase.auth.updateUser({ password: pw })
      if (pwError) {
        showInviteError('Fehler: ' + pwError.message)
        inviteSubmitBtn.disabled    = false
        inviteSubmitBtn.textContent = 'Konto aktivieren'
        return
      }

      // 2. Mitglied verknüpfen (member_id aus User-Metadaten)
      const { data: { session } } = await supabase.auth.getSession()
      const memberId = session?.user?.user_metadata?.member_id
      if (memberId && session?.user?.id) {
        await supabase.rpc('link_member_by_id', {
          p_member_id: memberId,
          p_user_id:   session.user.id,
        })
      }

      // 3. Willkommens-Seite anzeigen
      showWelcome(session.user, 'Dein Konto ist aktiviert. Öffne jetzt die Wabu AV App.')
    })

    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut()
      logoutBtn.textContent = 'Abgemeldet'
      logoutBtn.disabled    = true
    })
  </script>
</body>
</html>
